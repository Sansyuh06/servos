<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servos – Offline AI Forensic Assistant</title>
    <meta name="description" content="Servos: AI-powered offline digital forensics assistant. Forensics for the Rest of Us.">
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <div class="brand-icon">🛡️</div>
            <div>
                <h1 class="brand-name">SERVOS</h1>
                <p class="brand-tagline">Forensics for the Rest of Us</p>
            </div>
        </div>

        <nav class="sidebar-nav">
            <a class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
                <span class="nav-icon">📊</span> Dashboard
            </a>
            <a class="nav-item" data-page="investigate" onclick="navigate('investigate')">
                <span class="nav-icon">🔍</span> New Investigation
            </a>
            <a class="nav-item" data-page="scan" onclick="navigate('scan')">
                <span class="nav-icon">⚡</span> Quick Scan
            </a>
            <a class="nav-item" data-page="cases" onclick="navigate('cases')">
                <span class="nav-icon">📁</span> Past Cases
            </a>
            <a class="nav-item" data-page="playbooks" onclick="navigate('playbooks')">
                <span class="nav-icon">📋</span> Playbooks
            </a>
            <a class="nav-item" data-page="settings" onclick="navigate('settings')">
                <span class="nav-icon">⚙️</span> Settings
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="llm-status" id="llmStatus">
                <span class="status-dot offline"></span>
                <span>LLM: Checking...</span>
            </div>
            <p class="version">v1.0.0 – CyberHack V4</p>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <!-- Pages are rendered dynamically by app.js -->
    </main>

    <script src="/static/js/app.js"></script>
</body>
</html>
